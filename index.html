<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-5 포인트 뱅크</title>
    <style>
        :root { --primary: #4A90E2; --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; --bg: #F0F4F8; --plus: #E74C3C; --minus: #2980B9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .container { background: white; width: 100%; max-width: 800px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 45px 20px; text-align: center; position: relative; }
        .header h1 { margin: 0; font-size: 2.1rem; letter-spacing: -1px; }
        
        .list-container { padding: 10px 0; max-height: 75vh; overflow-y: auto; }
        .user-item { display: flex; align-items: center; padding: 20px 35px; border-bottom: 1px solid #F2F4F6; cursor: pointer; transition: 0.2s; }
        .user-item:hover { background-color: #F9FBFF; }
        
        .rank { width: 55px; font-weight: 800; font-size: 1.4rem; color: #BBB; flex-shrink: 0; }
        .rank-1 { color: var(--gold); } .rank-2 { color: var(--silver); } .rank-3 { color: var(--bronze); }
        
        .name { flex-grow: 1; font-weight: 700; color: #333; font-size: 1.4rem; margin-right: 15px; }
        
        /* 💡 포인트 영역: 숫자가 길어져도 잘리지 않도록 너비와 정렬 최적화 */
        .points { 
            font-weight: 800; 
            color: var(--primary); 
            font-size: 1.45rem; 
            background: #EBF5FF; 
            padding: 10px 22px; 
            border-radius: 12px; 
            min-width: 130px; 
            text-align: right;
            white-space: nowrap; 
        }

        /* 팝업 모달 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 550px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { background: #F8F9FA; padding: 22px; border-bottom: 1px solid #EEE; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { margin: 0; font-size: 1.4rem; color: #333; }
        
        .summary-box { display: flex; background: #FFF; padding: 20px; border-bottom: 1px solid #F0F0F0; justify-content: space-around; text-align: center; }
        .summary-value { font-size: 1.25rem; font-weight: 800; margin-top: 5px; }
        .modal-body { padding: 15px 25px; max-height: 450px; overflow-y: auto; }
        .log-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px dashed #EEE; }
        .plus { color: var(--plus); } .minus { color: var(--minus); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 2-5 포인트 뱅크</h1>
            <p>데이터 실시간 정밀 합산 모드</p>
        </div>
        <div id="list" class="list-container">
            <div style="text-align:center; padding:50px; color:#999;">데이터를 분석 중입니다...</div>
        </div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">활동 리포트</h2>
                <span style="cursor:pointer; font-size:1.8rem; color:#AAA; font-weight:bold;" onclick="closeModal()">&times;</span>
            </div>
            <div class="summary-box">
                <div class="summary-item">
                    <div style="font-size:0.85rem; color:#888;">누적 상점(+)</div>
                    <div id="totalPlus" class="summary-value plus">0</div>
                </div>
                <div class="summary-item" style="border-left: 1px solid #EEE; border-right: 1px solid #EEE;">
                    <div style="font-size:0.85rem; color:#888;">누적 벌점(-)</div>
                    <div id="totalMinus" class="summary-value minus">0</div>
                </div>
                <div class="summary-item">
                    <div style="font-size:0.85rem; color:#888;">최종 잔액</div>
                    <div id="totalNet" class="summary-value" style="color:var(--primary);">0</div>
                </div>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        const STEIN_URL = "https://api.steinhq.com/v1/storages/69a6fb04affba40a625861dd"; 
        let globalLogData = [];

        // 💡 [핵심] 어떤 오염된 데이터가 들어와도 온전한 숫자를 찾아내는 강력한 함수
        function toPureNumber(val) {
            if (val === undefined || val === null || val === "") return 0;
            // 쉼표, 특수문자, 공백 등을 모두 제거하고 숫자와 마이너스 부호만 남김
            const cleaned = String(val).replace(/[^0-9.-]/g, "");
            const num = Number(cleaned);
            return isNaN(num) ? 0 : num;
        }

        async function loadLeaderboard() {
            const listDiv = document.getElementById('list');
            const timestamp = new Date().getTime();

            try {
                const [statusRes, logRes] = await Promise.all([
                    fetch(`${STEIN_URL}/status?t=${timestamp}`), 
                    fetch(`${STEIN_URL}/log?t=${timestamp}`)
                ]);
                
                const statusData = await statusRes.json();
                globalLogData = await logRes.json();

                // 💡 Stein에서 가져온 데이터를 '진짜 숫자' 기준으로 다시 맵핑
                const cleanedData = statusData.filter(u => u.이름).map(u => {
                    return { ...u, cp: toPureNumber(u.잔액) };
                });

                // 내림차순 정렬
                cleanedData.sort((a, b) => b.cp - a.cp);
                listDiv.innerHTML = "";

                cleanedData.forEach((user, index) => {
                    const rank = index + 1;
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    item.onclick = () => openModal(user.이름, user.cp);
                    
                    item.innerHTML = `
                        <div class="rank ${rank <= 3 ? 'rank-' + rank : ''}">${rank}</div>
                        <div class="name">${user.이름}</div>
                        <div class="points">${Math.floor(user.cp).toLocaleString()} P</div>
                    `;
                    listDiv.appendChild(item);
                });
            } catch (e) {
                listDiv.innerHTML = "<div style='text-align:center; padding:50px;'>데이터 로드 실패</div>";
            }
        }

        function openModal(name, currentBalance) {
            const modal = document.getElementById('myModal');
            document.getElementById('modalTitle').innerText = `${name} 학생 리포트`;
            
            const logs = globalLogData.filter(l => l.이름 === name).reverse();
            let pSum = 0, mSum = 0;
            
            logs.forEach(l => {
                const v = toPureNumber(l.점수);
                if(v > 0) pSum += v; else mSum += v;
            });

            document.getElementById('totalPlus').innerText = `+${pSum.toLocaleString()}`;
            document.getElementById('totalMinus').innerText = `${mSum.toLocaleString()}`;
            document.getElementById('totalNet').innerText = `${currentBalance.toLocaleString()} P`;

            document.getElementById('modalBody').innerHTML = logs.map(l => `
                <div class="log-item">
                    <div style="display:flex; flex-direction:column;">
                        <span style="font-size:0.8rem; color:#999;">${l.날짜}</span>
                        <span style="font-weight:500;">${l.사유}</span>
                    </div>
                    <div class="${toPureNumber(l.점수) > 0 ? 'plus' : 'minus'}" style="font-weight:800; align-self:center; font-size:1.1rem;">
                        ${toPureNumber(l.점수) > 0 ? '+' : ''}${toPureNumber(l.점수).toLocaleString()}
                    </div>
                </div>
            `).join('') || '<p style="text-align:center; color:#CCC; padding:20px;">기록이 없습니다.</p>';

            modal.style.display = "flex";
        }

        function closeModal() { document.getElementById('myModal').style.display = "none"; }
        window.onclick = function(event) { if (event.target == document.getElementById('myModal')) closeModal(); }
        
        loadLeaderboard();
    </script>
</body>
</html>
