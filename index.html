<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-5 포인트 뱅크</title>
    <style>
        :root { 
            --challenger: #F40000; --master: #9D31FF; --gold: #D4AF37; --silver: #A8A8A8; --bronze: #CD7F32;
            --bg: #F0F4F8; --primary: #4A90E2; --plus: #E74C3C; --minus: #2980B9;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; padding-bottom: 70px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 800px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; }
        .list-container { padding: 10px 0; max-height: 70vh; overflow-y: auto; }
        .user-item { display: flex; align-items: center; padding: 18px 30px; border-bottom: 1px solid #F2F4F6; cursor: pointer; transition: 0.2s; }
        .user-item:hover { background-color: #F9FBFF; }
        
        .rank-area { width: 65px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .rank-num { font-weight: 800; font-size: 1.2rem; color: #BBB; }
        .tier-badge { font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; color: white; margin-top: 4px; }
        .t-challenger { background: var(--challenger); box-shadow: 0 0 8px rgba(244,0,0,0.3); }
        .t-master { background: var(--master); }
        .t-gold { background: var(--gold); }
        .t-silver { background: var(--silver); }
        .t-bronze { background: var(--bronze); }

        .name { flex-grow: 1; font-weight: 700; color: #333; font-size: 1.3rem; margin-left: 15px; }
        .points { font-weight: 800; color: var(--primary); font-size: 1.4rem; background: #EBF5FF; padding: 8px 18px; border-radius: 12px; min-width: 110px; text-align: right; }

        .top-1 { background: linear-gradient(to right, #FFFDF0, #FFFFFF); border-left: 5px solid var(--gold); }
        .top-2 { border-left: 5px solid var(--silver); }
        .top-3 { border-left: 5px solid var(--bronze); }

        /* 하단 전광판 */
        .news-ticker { position: fixed; bottom: 0; left: 0; width: 100%; background: #333; color: white; padding: 12px 0; font-size: 0.95rem; overflow: hidden; white-space: nowrap; z-index: 2000; }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker 30s linear infinite; font-weight: 500; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { background: #F8F9FA; padding: 20px; border-bottom: 1px solid #EEE; display: flex; justify-content: space-between; align-items: center; }
        .summary-box { display: flex; background: #FFF; padding: 20px; border-bottom: 1px solid #F0F0F0; justify-content: space-around; text-align: center; }
        .modal-body { padding: 15px 25px; max-height: 400px; overflow-y: auto; }
        .log-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px dashed #EEE; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 2-5 챌린저스 뱅크</h1>
            <p>우리 반의 전설이 되어보세요!</p>
        </div>
        <div id="list" class="list-container">
            <div style="text-align:center; padding:50px; color:#999;">학생 데이터를 불러오고 있습니다...</div>
        </div>
    </div>

    <div class="news-ticker">
        <div class="ticker-content" id="newsText">📢 공지사항을 불러오는 중입니다...</div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" style="margin:0; font-size:1.3rem;">활동 리포트</h2>
                <span style="cursor:pointer; font-size:1.5rem; color:#AAA;" onclick="closeModal()">&times;</span>
            </div>
            <div class="summary-box">
                <div style="flex:1;"><div style="font-size:0.8rem; color:#888;">상점</div><div id="totalPlus" style="font-weight:800; color:var(--plus); font-size:1.2rem;">0</div></div>
                <div style="flex:1; border-left:1px solid #EEE; border-right:1px solid #EEE;"><div style="font-size:0.8rem; color:#888;">벌점</div><div id="totalMinus" style="font-weight:800; color:var(--minus); font-size:1.2rem;">0</div></div>
                <div style="flex:1;"><div style="font-size:0.8rem; color:#888;">최종</div><div id="totalNet" style="font-weight:800; color:var(--primary); font-size:1.2rem;">0</div></div>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        const _u = "https://script.google.com/macros/s/AKfycbxwC4npay5vdEkSGWXHf744a0h9JPR4HYaX6EgJRDZjVhgmsPMFA-ysOuo1dxv_GKgwog/exec";
        let globalLog = [];

        function toN(v) { return Number(String(v || 0).replace(/[^0-9.-]/g, "")) || 0; }

        function getT(r) {
            if (r <= 3) return { n: 'CHALLENGER', c: 't-challenger', i: '👑' };
            if (r <= 10) return { n: 'MASTER', c: 't-master', i: '🔥' };
            if (r <= 15) return { n: 'GOLD', c: 't-gold', i: '⭐' };
            if (r <= 20) return { n: 'SILVER', c: 't-silver', i: '🛡️' };
            return { n: 'BRONZE', c: 't-bronze', i: '🌱' };
        }

       async function init() {
    const t = new Date().getTime();
    try {
        // 💡 주소 뒤에 ?type=status 와 ?type=log 를 붙여서 호출하도록 요렇게만 바꿔주세요.
        const [sR, lR] = await Promise.all([
            fetch(`${_u}?type=status`), 
            fetch(`${_u}?type=log`)
        ]);
                const sD = await sR.json();
                const logData = await lR.json();

                // 💡 [핵심 방어선 1] logData가 배열이 아닐 경우(에러) 빈 배열로 강제 처리하여 멈춤 방지
                globalLog = Array.isArray(logData) ? logData : [];

                const sheetNotice = (sD[0] && sD[0].공지) ? sD[0].공지 : "📢 공지사항이 없습니다.";
                document.getElementById('newsText').innerText = sheetNotice;

                // status 데이터도 안전하게 처리
                const clean = (Array.isArray(sD) ? sD : []).filter(u => u.이름).map(u => ({
                    ...u, cp: toN(u.잔액)
                })).sort((a, b) => b.cp - a.cp);

                const list = document.getElementById('list');
                list.innerHTML = clean.map((u, i) => {
                    const r = i + 1;
                    const tier = getT(r);
                    const medal = r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : '';
                    return `
                        <div class="user-item ${r <= 3 ? 'top-'+r : ''}" onclick="openModal('${u.이름}', ${u.cp})">
                            <div class="rank-area">
                                <span class="rank-num">${r}</span>
                                <span class="tier-badge ${tier.c}">${tier.n}</span>
                            </div>
                            <div class="name">${medal} ${u.이름} ${tier.i}</div>
                            <div class="points">${u.cp.toLocaleString()} P</div>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error("데이터 로드 에러:", e); }
        }

        // 💡 [핵심 방어선 2] 클릭 함수 전체를 try-catch로 감싸서 무조건 창이 뜨게 만듦
        function openModal(name, score) {
            try {
                document.getElementById('modalTitle').innerText = `${name} 학생 리포트`;
                
                // 에러 방지용 빈 배열 체크
                const safeLog = Array.isArray(globalLog) ? globalLog : [];
                const userLogs = safeLog.filter(l => l.이름 === name).reverse();
                
                let p = 0, m = 0;
                userLogs.forEach(l => { 
                    const v = toN(l.점수); 
                    if(v > 0) p += v; else m += v; 
                });

                document.getElementById('totalPlus').innerText = `+${p.toLocaleString()}`;
                document.getElementById('totalMinus').innerText = m.toLocaleString();
                document.getElementById('totalNet').innerText = `${score.toLocaleString()} P`;
                
                document.getElementById('modalBody').innerHTML = userLogs.map(l => `
                    <div class="log-item">
                        <div><div style="font-size:0.75rem; color:#999;">${l.날짜}</div><div style="font-weight:600;">${l.사유}</div></div>
                        <div style="font-weight:800; color:${toN(l.점수) > 0 ? 'var(--plus)' : 'var(--minus)'}">
                            ${toN(l.점수) > 0 ? '+' : ''}${toN(l.점수).toLocaleString()}
                        </div>
                    </div>`).join('') || '<p style="text-align:center; padding:20px; color:#999;">활동 내역이 아직 없거나 불러오지 못했습니다.</p>';
                
                document.getElementById('myModal').style.display = "flex";
                
            } catch (error) {
                // 어떤 오류가 나더라도 경고창으로 원인을 띄워줌
                alert("상세 내역을 여는 중 문제가 발생했습니다: " + error.message);
                console.error(error);
            }
        }

        function closeModal() { document.getElementById('myModal').style.display = "none"; }
        window.onclick = (e) => { if(e.target == document.getElementById('myModal')) closeModal(); }
        init();
    </script>
</body>
</html>
