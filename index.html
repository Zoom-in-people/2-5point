<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-5 포인트 뱅크</title>
    <style>
        :root { --primary: #4A90E2; --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; --bg: #F0F4F8; --plus: #E74C3C; --minus: #2980B9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 800px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 50px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 2.2rem; letter-spacing: -1px; }
        .list-container { padding: 20px 0; max-height: 75vh; overflow-y: auto; }
        .user-item { display: flex; align-items: center; padding: 20px 40px; border-bottom: 1px solid #F2F4F6; cursor: pointer; transition: 0.2; }
        .user-item:hover { background-color: #F9FBFF; }
        .rank { width: 60px; font-weight: 800; font-size: 1.4rem; color: #BBB; }
        .rank-1 { color: var(--gold); } .rank-2 { color: var(--silver); } .rank-3 { color: var(--bronze); }
        .name { flex-grow: 1; font-weight: 700; color: #333; font-size: 1.4rem; }
        .points { font-weight: 800; color: var(--primary); font-size: 1.5rem; background: #EBF5FF; padding: 8px 20px; border-radius: 12px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { background: #F8F9FA; padding: 20px; border-bottom: 1px solid #EEE; display: flex; justify-content: space-between; align-items: center; }
        .summary-box { display: flex; background: #FFF; padding: 15px 20px; border-bottom: 1px solid #F0F0F0; justify-content: space-around; text-align: center; }
        .summary-item { flex: 1; }
        .summary-label { font-size: 0.8rem; color: #888; }
        .summary-value { font-size: 1.1rem; font-weight: 800; }
        .modal-body { padding: 10px 20px; max-height: 400px; overflow-y: auto; }
        .log-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #EEE; }
        .log-pts { font-weight: 800; }
        .plus { color: var(--plus); } .minus { color: var(--minus); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🏆 2-5 포인트 뱅크</h1><p>이름을 클릭하여 전체 내역을 확인하세요</p></div>
        <div id="list" class="list-container"><div style="text-align:center; padding:50px; color:#999;">데이터 로드 중...</div></div>
    </div>
    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">학생 기록</h2><span style="cursor:pointer; font-size:1.5rem;" onclick="closeModal()">&times;</span></div>
            <div class="summary-box">
                <div class="summary-item"><div class="summary-label">누적 상점(+)</div><div id="totalPlus" class="summary-value plus">0</div></div>
                <div class="summary-item" style="border-left:1px solid #EEE; border-right:1px solid #EEE;"><div class="summary-label">누적 벌점(-)</div><div id="totalMinus" class="summary-value minus">0</div></div>
                <div class="summary-item"><div class="summary-label">최종 잔액</div><div id="totalNet" class="summary-value" style="color:#4A90E2;">0</div></div>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>
    <script>
        // 선생님의 Stein API 주소
        const STEIN_URL = "https://api.steinhq.com/v1/storages/69a6fb04affba40a625861dd"; 
        let globalLogData = [];

        async function loadLeaderboard() {
            try {
                // Stein API 호출 (status와 log 시트 각각 호출)
                const [statusRes, logRes] = await Promise.all([
                    fetch(`${STEIN_URL}/status`), 
                    fetch(`${STEIN_URL}/log`)
                ]);
                const statusData = await statusRes.json();
                globalLogData = await logRes.json();

                // 잔액(D열) 기준 내림차순 정렬
                statusData.sort((a, b) => Number(b.잔액) - Number(a.잔액));
                
                const listDiv = document.getElementById('list');
                listDiv.innerHTML = "";

                statusData.forEach((user, index) => {
                    if(!user.이름) return;
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    item.onclick = () => openModal(user.이름, user.잔액);
                    item.innerHTML = `
                        <div class="rank ${index < 3 ? 'rank-' + (index + 1) : ''}">${index + 1}</div>
                        <div class="name">${user.이름}</div>
                        <div class="points">${Number(user.잔액).toLocaleString()} P</div>
                    `;
                    listDiv.appendChild(item);
                });
            } catch (e) { 
                document.getElementById('list').innerHTML = "<div style='text-align:center; padding:50px;'>데이터 로드 실패. Stein 설정을 확인하세요.</div>"; 
            }
        }

        function openModal(name, currentBalance) {
            const logs = globalLogData.filter(l => l.이름 === name).reverse();
            let plusSum = 0, minusSum = 0;
            
            logs.forEach(l => {
                const p = parseFloat(l.점수) || 0;
                if(p > 0) plusSum += p; else minusSum += p;
            });

            document.getElementById('modalTitle').innerText = `${name} 학생 리포트`;
            document.getElementById('totalPlus').innerText = `+${plusSum.toLocaleString()}`;
            document.getElementById('totalMinus').innerText = `${minusSum.toLocaleString()}`;
            document.getElementById('totalNet').innerText = `${Number(currentBalance).toLocaleString()} P`;
            
            document.getElementById('modalBody').innerHTML = logs.map(l => `
                <div class="log-item">
                    <div style="display:flex; flex-direction:column;">
                        <span style="font-size:0.8rem; color:#999;">${l.날짜}</span>
                        <span style="font-weight:500;">${l.사유}</span>
                    </div>
                    <div class="log-pts ${l.점수 > 0 ? 'plus' : 'minus'}">
                        ${l.점수 > 0 ? '+' : ''}${Number(l.점수).toLocaleString()}
                    </div>
                </div>`).join('') || '<p style="text-align:center; color:#CCC;">기록이 없습니다.</p>';
            
            document.getElementById('myModal').style.display = "flex";
        }

        function closeModal() { document.getElementById('myModal').style.display = "none"; }
        window.onclick = function(e) { if (e.target == document.getElementById('myModal')) closeModal(); }
        
        loadLeaderboard();
    </script>
</body>
</html>
