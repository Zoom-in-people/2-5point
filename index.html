<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-5 포인트 뱅크</title>
    <style>
        :root { 
            --challenger: #F40000; --master: #9D31FF; --gold: #D4AF37; --silver: #A8A8A8; --bronze: #CD7F32;
            --bg: #F0F4F8; --primary: #4A90E2; 
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; padding-bottom: 60px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 800px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; }
        
        .list-container { padding: 10px 0; max-height: 70vh; overflow-y: auto; }
        .user-item { display: flex; align-items: center; padding: 18px 30px; border-bottom: 1px solid #F2F4F6; cursor: pointer; transition: 0.2s; }
        .user-item:hover { background-color: #F9FBFF; }
        
        /* 등수 및 티어 스타일 */
        .rank-area { width: 60px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .rank-num { font-weight: 800; font-size: 1.2rem; color: #BBB; }
        .tier-badge { font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; color: white; margin-top: 4px; }
        
        /* 티어별 색상 */
        .t-challenger { background: var(--challenger); box-shadow: 0 0 8px rgba(244,0,0,0.4); }
        .t-master { background: var(--master); }
        .t-gold { background: var(--gold); }
        .t-silver { background: var(--silver); }
        .t-bronze { background: var(--bronze); }

        .name { flex-grow: 1; font-weight: 700; color: #333; font-size: 1.3rem; margin-left: 15px; }
        .points { font-weight: 800; color: var(--primary); font-size: 1.4rem; background: #EBF5FF; padding: 8px 18px; border-radius: 12px; min-width: 120px; text-align: right; }

        /* 명예의 전당 효과 (1~3등) */
        .top-1 { background: linear-gradient(to right, #FFFDF0, #FFFFFF); border-left: 5px solid var(--gold); }
        .top-medal { font-size: 1.2rem; margin-right: 5px; }

        /* 하단 흐르는 자막 */
        .news-ticker { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #333; color: white; 
            padding: 10px 0; font-size: 0.9rem; overflow: hidden; white-space: nowrap; z-index: 2000;
        }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* 모달 스타일 생략... (기존과 동일) */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 2-5 챌린저스 뱅크</h1>
            <p>현재 우리 반 최고 티어는 누구?</p>
        </div>
        <div id="list" class="list-container"></div>
    </div>

    <div class="news-ticker">
        <div class="ticker-content" id="newsText">📢 데이터를 불러오는 중입니다...</div>
    </div>

    <script>
        // 💡 API 노출 방지 대안: 변수명을 모호하게 만들거나 암호화된 문자열을 복호화해서 사용 (여기선 기본형 유지)
        const _a = "https://api.steinhq.com/v1/storages/69a6fb04affba40a625861dd";
        let logs = [];

        function getTier(rank) {
            if (rank <= 3) return { name: 'CHALLENGER', class: 't-challenger', icon: '👑' };
            if (rank <= 10) return { name: 'MASTER', class: 't-master', icon: '🔥' };
            if (rank <= 15) return { name: 'GOLD', class: 't-gold', icon: '⭐' };
            if (rank <= 20) return { name: 'SILVER', class: 't-silver', icon: '🛡️' };
            return { name: 'BRONZE', class: 't-bronze', icon: '🌱' };
        }

        async function load() {
            const t = new Date().getTime();
            try {
                const [sRes, lRes] = await Promise.all([
                    fetch(`${_a}/status?t=${t}`), fetch(`${_a}/log?t=${t}`)
                ]);
                const sData = await sRes.json();
                logs = await lRes.json();

                // 💡 뉴스 자막 가져오기: status 시트의 G1 셀 등에 '공지사항' 열을 만들어 활용 가능
                // 여기서는 예시로 고정 메시지 또는 특정 셀 데이터를 연결하도록 구성합니다.
                document.getElementById('newsText').innerText = "📢 [공지] 이번 주 포인트 정산 완료! 1등은 현재 '이서지' 학생입니다. 축하합니다! | 과학 시간 실험 참여 시 보너스 500P 지급!";

                const cleaned = sData.filter(u => u.이름).map(u => ({
                    ...u, score: Number(String(u.잔액).replace(/[^0-9-]/g, "")) || 0
                })).sort((a, b) => b.score - a.score);

                const list = document.getElementById('list');
                list.innerHTML = cleaned.map((u, i) => {
                    const rank = i + 1;
                    const tier = getTier(rank);
                    const isTop = rank <= 3 ? `top-${rank}` : '';
                    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';

                    return `
                        <div class="user-item ${isTop}" onclick="alert('${u.이름} 학생의 상세 리포트는 준비 중입니다.')">
                            <div class="rank-area">
                                <span class="rank-num">${rank}</span>
                                <span class="tier-badge ${tier.class}">${tier.name}</span>
                            </div>
                            <div class="name">${medal} ${u.이름} ${tier.icon}</div>
                            <div class="points">${u.score.toLocaleString()} P</div>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error(e); }
        }
        load();
    </script>
</body>
</html>
