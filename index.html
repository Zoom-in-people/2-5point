<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2-5 포인트 뱅크</title>
    <style>
        :root { --primary: #4A90E2; --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; --bg: #F0F4F8; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 800px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 45px 20px; text-align: center; }
        .list-container { padding: 10px 0; max-height: 75vh; overflow-y: auto; }
        .user-item { display: flex; align-items: center; padding: 20px 35px; border-bottom: 1px solid #F2F4F6; cursor: pointer; }
        .rank { width: 55px; font-weight: 800; font-size: 1.4rem; color: #BBB; flex-shrink: 0; }
        .name { flex-grow: 1; font-weight: 700; color: #333; font-size: 1.4rem; }
        /* 💡 숫자가 길어져도 절대 잘리지 않도록 공간 확보 */
        .points { font-weight: 800; color: var(--primary); font-size: 1.5rem; background: #EBF5FF; padding: 10px 25px; border-radius: 12px; min-width: 140px; text-align: right; white-space: nowrap; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 24px; overflow: hidden; }
        .summary-box { display: flex; padding: 20px; border-bottom: 1px solid #EEE; text-align: center; }
        .summary-item { flex: 1; font-weight: 800; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🏆 2-5 포인트 뱅크</h1><p>데이터 정밀 분석 중...</p></div>
        <div id="list" class="list-container"></div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div style="padding:20px; border-bottom:1px solid #EEE; display:flex; justify-content:space-between;">
                <h2 id="modalTitle" style="margin:0;">기록 확인</h2>
                <span onclick="closeModal()" style="cursor:pointer; font-size:1.5rem;">&times;</span>
            </div>
            <div class="summary-box">
                <div id="totalPlus" style="flex:1; color:#E74C3C;">0</div>
                <div id="totalMinus" style="flex:1; color:#2980B9; border-left:1px solid #EEE; border-right:1px solid #EEE;">0</div>
                <div id="totalNet" style="flex:1; color:#4A90E2;">0</div>
            </div>
            <div id="modalBody" style="padding:20px; max-height:400px; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
        const STEIN_URL = "https://api.steinhq.com/v1/storages/69a6fb04affba40a625861dd";
        let globalLog = [];

        // 💡 [핵심] 쉼표, 공백, 문자가 섞여도 '18000' 전체를 찾아내는 로직
        function parsePoint(val) {
            if (!val) return 0;
            // 숫자와 마이너스(-)만 남기고 모두 제거
            const cleaned = String(val).replace(/[^0-9-]/g, "");
            return parseInt(cleaned, 10) || 0;
        }

        async function init() {
            const t = new Date().getTime();
            try {
                const [sRes, lRes] = await Promise.all([
                    fetch(`${STEIN_URL}/status?t=${t}`),
                    fetch(`${STEIN_URL}/log?t=${t}`)
                ]);
                const sData = await sRes.json();
                globalLog = await lRes.json();

                // 💡 디버깅용: 18000 학생의 데이터가 실제로 어떻게 들어오는지 콘솔에 찍습니다.
                console.log("원본 데이터 확인:", sData);

                const cleaned = sData.filter(u => u.이름).map(u => {
                    return { ...u, score: parsePoint(u.잔액) };
                });

                cleaned.sort((a, b) => b.score - a.score);
                const list = document.getElementById('list');
                list.innerHTML = "";

                cleaned.forEach((u, i) => {
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    item.onclick = () => openModal(u.이름, u.score);
                    item.innerHTML = `
                        <div class="rank">${i+1}</div>
                        <div class="name">${u.이름}</div>
                        <div class="points">${u.score.toLocaleString()} P</div>
                    `;
                    list.appendChild(item);
                });
            } catch (e) { console.error("데이터 로드 오류:", e); }
        }

        function openModal(name, score) {
            document.getElementById('modalTitle').innerText = `${name} 학생 리포트`;
            const logs = globalLog.filter(l => l.이름 === name).reverse();
            let p = 0, m = 0;
            logs.forEach(l => { 
                const v = parsePoint(l.점수);
                if(v > 0) p += v; else m += v;
            });
            document.getElementById('totalPlus').innerText = `+${p.toLocaleString()}`;
            document.getElementById('totalMinus').innerText = m.toLocaleString();
            document.getElementById('totalNet').innerText = `${score.toLocaleString()} P`;
            document.getElementById('modalBody').innerHTML = logs.map(l => `
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed #EEE;">
                    <div><div style="font-size:0.7rem; color:#999;">${l.날짜}</div><div>${l.사유}</div></div>
                    <div style="font-weight:800; color:${parsePoint(l.점수) > 0 ? '#E74C3C' : '#2980B9'}">
                        ${parsePoint(l.점수) > 0 ? '+' : ''}${parsePoint(l.점수).toLocaleString()}
                    </div>
                </div>`).join('');
            document.getElementById('myModal').style.display = "flex";
        }
        function closeModal() { document.getElementById('myModal').style.display = "none"; }
        init();
    </script>
</body>
</html>
